name: Refresh Convex Template

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-convex-template
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Remove repo contents except .git and .github
        shell: bash
        run: |
          shopt -s dotglob nullglob
          for path in *; do
            case "$path" in
              .git|.github)
                continue
                ;;
            esac
            rm -rf -- "$path"
          done

      - name: Recreate app from Convex starter
        env:
          CI: "1"
        run: npm create convex@latest . -- --verbose -t nextjs-convexauth

      - name: Restore root files
        run: |
          curl -fsSL https://raw.githubusercontent.com/rorhug/create-convex-cloud/main/generateJwtKeys.mjs -o generateJwtKeys.mjs
          curl -fsSL https://raw.githubusercontent.com/rorhug/create-convex-cloud/main/set-convex-env.sh -o set-convex-env.sh
          curl -fsSL https://raw.githubusercontent.com/rorhug/create-convex-cloud/main/vercel.json -o vercel.json
          chmod +x set-convex-env.sh

      - name: Commit changes if needed
        shell: bash
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Refresh Convex template"
          git push origin HEAD:main
