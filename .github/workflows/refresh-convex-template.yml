name: Refresh Convex Template

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-convex-template
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch Convex starter template
        shell: bash
        run: |
          tmpdir="$(mktemp -d)"
          git clone --depth=1 --filter=blob:none --sparse https://github.com/get-convex/templates.git "$tmpdir"
          git -C "$tmpdir" sparse-checkout set template-nextjs-convexauth

          if [ ! -f "$tmpdir/template-nextjs-convexauth/.gitignore" ]; then
            echo "Expected the template to include a root .gitignore, but none was found."
            exit 1
          fi

          shopt -s dotglob nullglob
          for path in *; do
            case "$path" in
              .git|.github)
                continue
                ;;
            esac
            rm -rf -- "$path"
          done

          cp -R "$tmpdir"/template-nextjs-convexauth/. .
          rm -rf "$tmpdir"

      - name: Restore root files
        run: |
          curl -fsSL https://raw.githubusercontent.com/rorhug/create-convex-cloud/main/generateJwtKeys.mjs -o generateJwtKeys.mjs
          curl -fsSL https://raw.githubusercontent.com/rorhug/create-convex-cloud/main/set-convex-env.sh -o set-convex-env.sh
          curl -fsSL https://raw.githubusercontent.com/rorhug/create-convex-cloud/main/vercel.json -o vercel.json
          chmod +x set-convex-env.sh

      - name: Commit changes if needed
        shell: bash
        run: |
          if [ ! -f .gitignore ]; then
            echo "Expected a root .gitignore after scaffolding, but none was found."
            exit 1
          fi

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Refresh Convex template"
          git push origin HEAD:main
